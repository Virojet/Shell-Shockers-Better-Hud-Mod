name: Sync meta.js

on:
  push:
    branches: [main]
    paths:
      - "Shell-Shockers-Better-Hud.user.js"

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract userscript metadata
        run: |
          sed -n '/==UserScript==/,/==\/UserScript==/p' \
            Shell-Shockers-Better-Hud.user.js > Shell-Shockers-Better-Hud.meta.js

      - name: Commit metadata if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Shell-Shockers-Better-Hud.meta.js
          git diff --cached --quiet || git commit -m "chore: sync meta.js [skip ci]"
          git push
